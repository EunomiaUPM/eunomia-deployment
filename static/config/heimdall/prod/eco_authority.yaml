# ==========================
# COMMON ANCHORS
# ==========================
http_host: &http_host
  protocol: 'https'
  url: 'dev-datapaces.dit.upm.es'
  port: null
  internal_port: '1500'

# ==========================
# CONFIG
# ==========================

hosts_config:
  http: *http_host
  grpc: null
  graphql: null

connection_config:
  is_local: false
  is_prod: true
  is_vault_real: true
  has_tls_proxy: true

db_config:
  db_type: Postgres
  url: 'heimdall-db'
  port: '5432'

wallet_config:
  api:
    protocol: 'https'
    url: 'wallet.demo.walt.id'
    port: null
  id: null

did_config:
  did: 'did:web:dev-datapaces.dit.upm.es'
  type: Web
  did_web_options:
    domain: 'dev-datapaces.dit.upm.es'
    path: null

role: EcoAuthority

api_config:
  version: 'v1'
  openapi_path: '/app/static/specs/openapi/openapi.json'

vc_config:
  vc_model: JwtVc
  w3c_data_model: V2

issue_config:
  ds_config:
    dataspace_id: 'HeimdallDataspace'
  clh_config:
    label_level: 'SC'
    engine_version: '2.11.0'
    rules_version: 'CD25.10'
    validated_criteria: 'https://docs.gaia-x.eu/policy-rules-committee/compliance-document/25.10/criteria_participant/#PA1.1'

verify_req_config:
  is_cert_allowed: true
  vcs_requested: [ 'gx:VatId','gx:LegalPerson','gx:TermsAndConditions' ]

is_react: true
